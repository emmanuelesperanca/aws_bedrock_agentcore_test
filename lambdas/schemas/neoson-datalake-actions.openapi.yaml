openapi: "3.0.0"
info:
  title: Neoson Data Lake Action Group API
  version: "1.0.0"
  description: >
    Track B — Natural Language to SQL tool exposing production, quality,
    maintenance, and KPI data from the Straumann Group Glue Data Catalog
    via Amazon Athena.
    Queries are generated by Claude Haiku and filtered by user department (RLS).

paths:
  /query_data_lake:
    post:
      operationId: query_data_lake
      summary: Query the operational data lake with a natural language question
      description: >
        Translates the employee's question into an Athena SQL query, executes it,
        and returns the results. Automatically enforces row-level security based on
        the employee's department (from the Entra ID JWT session attributes).

        Available data domains:
        - **producao_diaria**: Daily production output by line, shift, product
        - **qualidade_inspe**: Quality inspection results by batch
        - **manutencao_ordens**: Maintenance orders (preventive and corrective)
        - **indicadores_kpi**: Consolidated KPIs by area and period

        Examples of supported questions:
        - "Qual foi a produção total da linha 3 na semana passada?"
        - "Mostre os 10 defeitos mais frequentes de outubro"
        - "Qual o custo total de manutenção corretiva em 2024?"
        - "Compare o OEE das linhas 1, 2 e 3 no mês atual"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pergunta
              properties:
                pergunta:
                  type: string
                  description: >
                    Natural language question about operational data.
                    Be specific about time periods, departments, lines, or products
                    to get more accurate results.
                    Example: "Qual foi o índice de rejeição da linha 2 em outubro de 2024?"
      responses:
        "200":
          description: Query results with the SQL that was executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  sql_executado:
                    type: string
                    description: The Athena SQL query that was generated and executed
                  total_linhas:
                    type: integer
                    description: Number of result rows returned (max 50)
                  resultados:
                    type: array
                    description: Query result rows as key-value objects
                    items:
                      type: object
                  erro:
                    type: boolean
                  mensagem:
                    type: string
                    description: Human-readable error message if the query failed

components:
  schemas: {}
